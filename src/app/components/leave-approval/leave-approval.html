<mat-card>
  <h2>Leave Approval</h2>

  <table mat-table [dataSource]="leaves" class="mat-elevation-z8">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let leave">{{ leave.id }}</td>
    </ng-container>

    <ng-container matColumnDef="employeeId">
      <th mat-header-cell *matHeaderCellDef>Employee ID</th>
      <td mat-cell *matCellDef="let leave">{{ leave.employeeId }}</td>
    </ng-container>

    <ng-container matColumnDef="fromDate">
      <th mat-header-cell *matHeaderCellDef>From</th>
      <td mat-cell *matCellDef="let leave">{{ leave.fromDate }}</td>
    </ng-container>

    <ng-container matColumnDef="toDate">
      <th mat-header-cell *matHeaderCellDef>To</th>
      <td mat-cell *matCellDef="let leave">{{ leave.toDate }}</td>
    </ng-container>

    <ng-container matColumnDef="reason">
      <th mat-header-cell *matHeaderCellDef>Reason</th>
      <td mat-cell *matCellDef="let leave">{{ leave.reason }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let leave">{{ leave.status }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let leave">
        <button
          mat-raised-button
          color="primary"
          (click)="approveLeave(leave)"
          [disabled]="leave.status !== 'Pending'">
          Approve
        </button>

        <button
          mat-raised-button
          color="warn"
          (click)="rejectLeave(leave)"
          [disabled]="leave.status !== 'Pending'">
          Reject
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

  </table>
</mat-card>
