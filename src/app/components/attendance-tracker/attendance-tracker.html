<mat-card>
  <h2>Attendance Tracker</h2>

  <table mat-table [dataSource]="employees" class="mat-elevation-z8">

    <!-- Employee -->
    <ng-container matColumnDef="employee">
      <th mat-header-cell *matHeaderCellDef>Employee</th>
      <td mat-cell *matCellDef="let emp">
        {{ emp.name }}
      </td>
    </ng-container>

    <!-- Date -->
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let emp">
        {{ today }}
      </td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let emp">
        <mat-select [(ngModel)]="emp.selectedStatus">
          <mat-option value="Present">Present</mat-option>
          <mat-option value="Absent">Absent</mat-option>
          <mat-option value="Leave">Leave</mat-option>
        </mat-select>
      </td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Save</th>
      <td mat-cell *matCellDef="let emp">
        <button
          mat-raised-button
          color="primary"
          [disabled]="!emp.selectedStatus"
          (click)="markAttendance(emp, emp.selectedStatus)">
          Save
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

  </table>
</mat-card>
