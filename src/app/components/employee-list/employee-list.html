<mat-card>

<h2>Employees</h2>

<form (ngSubmit)="addEmployee()" class="form">

<mat-form-field>
<input matInput placeholder="Name" [(ngModel)]="newEmployee.name" name="name">
</mat-form-field>

<mat-form-field>
<input matInput placeholder="Department" [(ngModel)]="newEmployee.department" name="department">
</mat-form-field>

<button mat-raised-button color="primary">Add</button>

</form>

<table mat-table [dataSource]="employees">

<ng-container matColumnDef="id">
<th mat-header-cell *matHeaderCellDef>ID</th>
<td mat-cell *matCellDef="let e">{{e.id}}</td>
</ng-container>

<ng-container matColumnDef="name">
<th mat-header-cell *matHeaderCellDef>Name</th>
<td mat-cell *matCellDef="let e">{{e.name}}</td>
</ng-container>

<ng-container matColumnDef="department">
<th mat-header-cell *matHeaderCellDef>Department</th>
<td mat-cell *matCellDef="let e">{{e.department}}</td>
</ng-container>

<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
<tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

</mat-card>
