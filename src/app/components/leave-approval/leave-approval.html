<mat-card>

<h2>Leave Approval</h2>

<table mat-table [dataSource]="leaveRequests">

<ng-container matColumnDef="employee">
<th mat-header-cell *matHeaderCellDef>Employee</th>
<td mat-cell *matCellDef="let l">{{l.employeeName}}</td>
</ng-container>

<ng-container matColumnDef="start">
<th mat-header-cell *matHeaderCellDef>Start</th>
<td mat-cell *matCellDef="let l">{{l.startDate}}</td>
</ng-container>

<ng-container matColumnDef="end">
<th mat-header-cell *matHeaderCellDef>End</th>
<td mat-cell *matCellDef="let l">{{l.endDate}}</td>
</ng-container>

<ng-container matColumnDef="reason">
<th mat-header-cell *matHeaderCellDef>Reason</th>
<td mat-cell *matCellDef="let l">{{l.reason}}</td>
</ng-container>

<ng-container matColumnDef="status">
<th mat-header-cell *matHeaderCellDef>Status</th>
<td mat-cell *matCellDef="let l">{{l.status}}</td>
</ng-container>

<ng-container matColumnDef="action">
<th mat-header-cell *matHeaderCellDef>Action</th>

<td mat-cell *matCellDef="let l">

<button mat-raised-button color="primary"
(click)="approveLeave(l)">
Approve
</button>

<button mat-raised-button color="warn"
(click)="rejectLeave(l)">
Reject
</button>

</td>

</ng-container>

<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
<tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

</mat-card>
